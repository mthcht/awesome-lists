name: Build TOR Node History

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Force full rebuild from scratch'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout with FULL history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build history
        run: |
          ARGS="--output Lists/TOR/tor_nodes_history.json"
          if [ "${{ inputs.full_rebuild }}" = "true" ]; then
            ARGS="$ARGS --full"
          fi
          python Lists/TOR/build_tor_history.py $ARGS

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Lists/TOR/tor_nodes_history.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            TOTAL=$(python3 -c "import json; print(json.load(open('Lists/TOR/tor_nodes_history.json'))['total_ips'])")
            git commit -m "tor history: ${TOTAL} unique IPs [skip ci]"
            git push
          fi
